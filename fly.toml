# fly.toml — Fly.io app configuration
# Replace "your-app-name" with your actual app name (must be globally unique)

app = "your-app-name"
primary_region = "iad"   # US East (Washington DC) as primary

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # Keep alive for consistent traffic
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Health checks
[[services.tcp_checks]]
  grace_period = "1s"
  interval = "15s"
  restart_limit = 0
  timeout = "2s"

[[services.http_checks]]
  interval = "10s"
  grace_period = "5s"
  method = "get"
  path = "/health"
  protocol = "http"
  timeout = "2s"
  tls_skip_verify = false
