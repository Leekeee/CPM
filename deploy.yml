name: Deploy to Fly.io (US · UK · EU)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  IMAGE_NAME: registry.fly.io/${{ secrets.FLY_APP_NAME }}

jobs:
  # ── Job 1: Build & Test ────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Authenticate with Fly.io registry
        run: flyctl auth docker

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ── Job 2: Deploy to US (primary) ─────────────────────────────────────────
  deploy-us:
    name: Deploy → US (iad)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production-us

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to US region
        run: |
          flyctl deploy \
            --app ${{ secrets.FLY_APP_NAME }}-us \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region iad \
            --strategy rolling \
            --wait-timeout 120

  # ── Job 3: Deploy to UK ────────────────────────────────────────────────────
  deploy-uk:
    name: Deploy → UK (lhr)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production-uk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to UK region
        run: |
          flyctl deploy \
            --app ${{ secrets.FLY_APP_NAME }}-uk \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region lhr \
            --strategy rolling \
            --wait-timeout 120

  # ── Job 4: Deploy to EU ────────────────────────────────────────────────────
  deploy-eu:
    name: Deploy → EU (ams)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production-eu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to EU region
        run: |
          flyctl deploy \
            --app ${{ secrets.FLY_APP_NAME }}-eu \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ams \
            --strategy rolling \
            --wait-timeout 120

  # ── Job 5: Smoke test all regions ─────────────────────────────────────────
  smoke-test:
    name: Smoke test all regions
    needs: [deploy-us, deploy-uk, deploy-eu]
    runs-on: ubuntu-latest

    steps:
      - name: Health check US
        run: curl -f https://${{ secrets.FLY_APP_NAME }}-us.fly.dev/health

      - name: Health check UK
        run: curl -f https://${{ secrets.FLY_APP_NAME }}-uk.fly.dev/health

      - name: Health check EU
        run: curl -f https://${{ secrets.FLY_APP_NAME }}-eu.fly.dev/health
